<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="img/logos/favicon2.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <title>Catálogo Mi-Mayo</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="img/logos/logo.png" alt="Mi Mayo" />
      </div>

      <div class="buscador">
        <input
          type="search"
          id="buscar"
          placeholder="Buscar por nombre o marca..."
        />
      </div>

      <nav class="menu-pc">
        <a
          href="https://wa.me/5491169117952"
          target="_blank"
          aria-label="WhatsApp"
        >
          <i class="fa-brands fa-whatsapp"></i>
        </a>

        <a
          href="https://www.instagram.com/mimayo.ciudadevita/"
          target="_blank"
          aria-label="Instagram"
        >
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#" id="btnMapaPc">
          <i class="fa-solid fa-location-dot"></i>
          Ubicación
        </a>
      </nav>

      <button id="btnMenu" class="btn-menu">
        <span id="iconoMenu">☰</span>
      </button>
    </header>
    <div id="overlay" class="overlay"></div>
    <aside id="menuLateral" class="menu-lateral">
      <h2>Categorías</h2>

      <section id="categoriasMenu"></section>

      <hr />

      <button onclick="window.open('https://wa.me/5491169117952', '_blank')">
        <i class="fa-brands fa-whatsapp"></i>
        WhatsApp
      </button>

      <button
        onclick="
          window.open('https://www.instagram.com/mimayo.ciudadevita/', '_blank')
        "
      >
        <i class="fa-brands fa-instagram"></i>
        Instagram
      </button>

      <button id="btnMapa">
        <i class="fa-solid fa-location-dot"></i>
        Ubicación
      </button>
    </aside>
    <main>
      <section id="categorias" class="categorias"></section>

      <div class="barra-superior">
        <p id="contadorResultados" class="contador-resultados"></p>

        <select id="ordenar">
          <option value="default">Ordenar por...</option>

          <option value="nombre">Nombre (A-Z)</option>

          <option value="precioAsc">Precio (Menor a Mayor)</option>

          <option value="precioDesc">Precio (Mayor a Menor)</option>
        </select>
      </div>

      <section id="productos" class="productos"></section>
    </main>

    <!-- Modal Ubicación -->
    <div id="modalUbicacion" class="modal">
      <div class="modal-contenido">
        <span class="cerrar-modal" id="cerrarModal">&times;</span>

        <h2>
          <i class="fa-solid fa-location-dot"></i>
          Ubicación
        </h2>

        <div class="modal-grid">
          <div>
            <img
              src="img/banners/mapa.png"
              alt="Mapa Mi Mayo"
              class="mapa-modal"
            />
          </div>

          <div class="info-modal">
            <div class="direccion">
              <h3>📍 Dirección</h3>

              <p>
                Tte. Gral. Juan Domingo Perón 2280<br />
                (Ex Lapacho)<br /><br />
                Ciudad Evita, Buenos Aires.
              </p>
            </div>

            <hr />

            <div class="horarios">
              <h3>🕒 Horarios</h3>

              <p>Lunes a Viernes: 08:00 a 16:00 hs.</p>
              <br />
              <p>Sábados: 08:00 a 12:00 hs.</p>
              <br />
              <p>Domingos: Cerrado.</p>
            </div>

            <a
              href="https://maps.app.goo.gl/VN9KJjiJTCNew4uD8"
              target="_blank"
              class="btn-maps"
            >
              Abrir en Google Maps
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Producto -->
    <div id="modalProducto" class="modal">
      <div class="modal-contenido modal-producto">
        <span id="cerrarProducto" class="cerrar-modal">&times;</span>

        <div class="producto-modal-grid">
          <div class="producto-imagen">
            <img id="modalImagen" src="" alt="" />
          </div>

          <div class="producto-info">
            <h2 id="modalNombre"></h2>

            <p class="modal-marca" id="modalMarca"></p>

            <p><strong>Categoría:</strong> <span id="modalCategoria"></span></p>

            <p><strong>Código:</strong> <span id="modalCodigo"></span></p>

            <p class="modal-precio" id="modalPrecio"></p>

            <div class="modal-botones">
              <button id="btnCompartir">
                <i class="fa-solid fa-share-nodes"></i>
                Compartir
              </button>

              <button id="btnWhatsappProducto">
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer></footer>

    <script src="js/script.js"></script>
  </body>
</html>
